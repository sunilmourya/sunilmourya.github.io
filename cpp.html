---
layout: default
title: C++ Journey
---
<div class="container">
  <div class="hero">
    <p class="hero-eyebrow">// c++ journey</p>
    <h1>Rust <em>posts</em></h1>
  </div>
  <div class="post-list">
    {% for post in site.posts %}
    {% if post.category == "C++" %}
    <div class="post-item">
      <div class="post-item-date">{{ post.date | date: "%d %b" }}</div>
      <div class="post-item-body">
        {% if post.day %}<span class="post-item-tag tag-100days">Day {{ post.day }}</span>{% endif %}
        <a href="{{ post.url }}" class="post-item-title">{{ post.title }}</a>
        <p class="post-item-excerpt">{{ post.excerpt | truncatewords: 18 }}</p>
      </div>
    </div>
    {% endif %}
    {% endfor %}
  </div>
</div>
